services:
  dagster-webserver:
    build: .
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w workspace.yaml
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DAGSTER_HOME: /dagster_home
    volumes:
      - .:/app
      - ./deploy/dagster_home:/dagster_home

  dagster-daemon:
    build: .
    command: dagster-daemon run
    env_file:
      - .env.local
    environment:
      DAGSTER_HOME: /dagster_home
    volumes:
      - .:/app
      - ./deploy/dagster_home:/dagster_home
